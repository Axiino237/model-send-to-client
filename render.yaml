services:
  # ── Backend: NestJS API ─────────────────────────────────────────────────────
  - type: web
    name: models-link-share-backend
    runtime: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install && npm run build && npx prisma generate
    startCommand: cd backend && npm run start:render
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false   # ← Set in Render Dashboard (pooled URL with ?pgbouncer=true)
      - key: DIRECT_URL
        sync: false   # ← Set in Render Dashboard (direct URL port 5432, no pgbouncer)
      - key: JWT_SECRET
        sync: false   # ← Set in Render Dashboard
      - key: FRONTEND_URL
        sync: false   # ← Set to your Render frontend URL after first deploy
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_S3_BUCKET_NAME
        value: models-link-share-uploads

  # ── Frontend: React/Vite Static Site ────────────────────────────────────────
  - type: static
    name: models-link-share-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false   # ← Set to: https://models-link-share-backend.onrender.com/api
      - key: VITE_API_BASE_URL
        sync: false   # ← Set to: https://models-link-share-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
